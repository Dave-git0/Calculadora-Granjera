<!DOCTYPE html>
<html lang="es">
<head>
    
    <meta charset="UTF-8">
    <title>Calculadora Ganadera</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: rgb(0, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 40px;
            margin-top: -150px;
        }

        .btn {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-calculadora {
            background-color: #2e5c2e;
            color: white;
        }

        .btn-glosario {
            background-color: #2e5c2e;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calculadora Ganadera</h1>

        <!-- Botón a la calculadora -->
        <a href="{{ url_for('calculadora') }}">
            <button class="btn btn-calculadora">
                Ir a la Calculadora
            </button>
        </a>

        <!-- Botón al glosario -->
        <a href="{{ url_for('glosario') }}">
            <button class="btn btn-glosario">
                Ver Glosario
            </button>
        </a>
    </div>

</body>
</html>
